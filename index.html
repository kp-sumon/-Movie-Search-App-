<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Movie Finder 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        /* ৩ডি গ্লাস ইফেক্ট এবং অ্যানিমেশন */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .movie-poster-3d {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .movie-poster-3d:hover {
            transform: scale(1.05) rotateY(10deg);
            box-shadow: 0 30px 60px rgba(6, 182, 212, 0.3);
        }
        /* অ্যানিমেটেড ব্যাকগ্রাউন্ড */
        .bg-animate {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* নাম এবং এলিমেন্টের জন্য নিয়ন গ্লো */
        .neon-text {
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.6), 0 0 20px rgba(244, 63, 94, 0.4);
        }
    </style>
</head>
<body class="bg-animate text-slate-100 min-h-screen font-sans relative overflow-x-hidden">

    <nav class="sticky top-0 z-50 border-b border-white/5 bg-slate-950/40 backdrop-blur-md p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎬</span>
                <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-cyan-400 via-fuchsia-500 to-indigo-400 bg-clip-text text-transparent">MovieFinder</h1>
            </div>
            <div class="text-sm font-bold tracking-widest text-fuchsia-400 bg-fuchsia-500/10 border border-fuchsia-500/30 px-4 py-1.5 rounded-full shadow-lg neon-text">
                Made with ❤️ by Kp Súmöñ
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 pb-12 relative z-10">
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-black mb-4 bg-gradient-to-r from-white via-slate-200 to-slate-500 bg-clip-text text-transparent">Discover Unlimited Movies</h2>
            <p class="text-slate-400 mb-8 max-w-md mx-auto text-sm md:text-base">Get instant details, ratings, and posters powered by real-time live OMDb Engine.</p>
            
            <div class="flex max-w-xl mx-auto bg-slate-900/60 border border-white/10 rounded-2xl overflow-hidden p-2 focus-within:border-cyan-400 focus-within:ring-2 focus-within:ring-cyan-500/20 transition-all duration-300 shadow-2xl backdrop-blur-xl">
                <div class="flex items-center pl-4 text-slate-500">
                    <i class="fa-solid fa-clapperboard text-lg"></i>
                </div>
                <input id="movieInput" type="text" placeholder="Search movies (e.g., Avatar, Inception...)" 
                       class="w-full bg-transparent px-4 py-3 outline-none text-slate-100 placeholder-slate-500 text-base">
                <button onclick="searchMovie()" class="bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-600 text-white font-bold px-8 rounded-xl hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center gap-2 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </button>
            </div>
        </div>

        <div id="loader" class="hidden text-center my-12">
            <div class="relative inline-flex">
                <div class="w-12 h-12 rounded-full border-4 border-t-cyan-400 border-r-fuchsia-500 border-b-indigo-400 border-l-transparent animate-spin"></div>
                <div class="w-12 h-12 rounded-full border-4 border-dashed border-white/10 absolute top-0 left-0 animate-ping opacity-25"></div>
            </div>
            <p class="text-xs text-cyan-400/80 mt-3 font-semibold tracking-widest animate-pulse">SEARCHING BY Kp Súmöñ...</p>
        </div>

        <div id="movieResult" class="hidden max-w-4xl mx-auto glass-card rounded-3xl p-6 md:p-10 grid grid-cols-1 md:grid-cols-3 gap-8 transform transition-all duration-500">
            <div class="flex justify-center perspective-[1000px]">
                <img id="moviePoster" src="" alt="Poster" class="movie-poster-3d rounded-2xl object-cover w-full max-w-[260px] border border-white/10 shadow-2xl">
            </div>
            <div class="md:col-span-2 flex flex-col justify-between">
                <div>
                    <h3 id="movieTitle" class="text-3xl md:text-4xl font-extrabold text-white tracking-wide"></h3>
                    <div class="flex flex-wrap gap-3 my-4">
                        <span id="movieYear" class="bg-white/5 border border-white/10 px-3 py-1 rounded-full text-xs text-cyan-400 font-semibold"></span>
                        <span id="movieRating" class="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                            <i class="fa-solid fa-star text-xs"></i> <span id="ratingValue"></span>
                        </span>
                        <span id="movieRuntime" class="bg-white/5 border border-white/10 px-3 py-1 rounded-full text-xs text-slate-300"></span>
                    </div>
                    <p id="moviePlot" class="text-slate-300 leading-relaxed mt-4 text-sm md:text-base font-light"></p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-t border-white/10 pt-6 mt-6 text-sm">
                    <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="text-slate-500 block text-xs uppercase tracking-wider mb-1">Director</span>
                        <span id="movieDirector" class="text-cyan-300 font-semibold"></span>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl border border-white/5">
                        <span class="text-slate-500 block text-xs uppercase tracking-wider mb-1">Top Casts</span>
                        <span id="movieActors" class="text-fuchsia-300 font-semibold"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
