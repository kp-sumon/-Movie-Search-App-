<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder 🎬</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .movie-card:hover { transform: translateY(-8px); transition: all 0.3s ease; }
        .glass-nav { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-800 p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎬</span>
                <h1 class="text-2xl font-bold tracking-wider text-cyan-400">MovieFinder</h1>
            </div>
            <div class="text-sm text-slate-400">Made with ❤️ by Sumon</div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 pb-12">
        <!-- Search Section -->
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Search Your Favorite Movies</h2>
            <p class="text-slate-400 mb-6">Enter any movie name to get instant details, ratings, and posters!</p>
            
            <div class="flex max-w-lg mx-auto bg-slate-900 border border-slate-700 rounded-full overflow-hidden p-1 focus-within:border-cyan-400">
                <input id="movieInput" type="text" placeholder="e.g., Batman, Avengers, Titanic..." 
                       class="w-full bg-transparent px-6 py-3 outline-none text-slate-100">
                <button onclick="searchMovie()" class="bg-gradient-to-r from-cyan-500 to-blue-600 text-slate-950 font-bold px-8 rounded-full hover:opacity-90 transition-all flex items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> Search
                </button>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden text-center my-8">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-cyan-400 border-t-transparent rounded-full"></div>
        </div>

        <!-- Movie Result Area -->
        <div id="movieResult" class="hidden max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-3xl p-6 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Movie Poster -->
            <div class="flex justify-center">
                <img id="moviePoster" src="" alt="Poster" class="rounded-2xl object-cover w-full max-w-[260px] border border-slate-700 shadow-2xl">
            </div>
            <!-- Movie Details -->
            <div class="md:col-span-2 flex flex-col justify-between">
                <div>
                    <h3 id="movieTitle" class="text-3xl font-bold text-white mb-2"></h3>
                    <div class="flex flex-wrap gap-3 my-3">
                        <span id="movieYear" class="bg-slate-800 px-3 py-1 rounded-full text-xs text-cyan-400 font-semibold"></span>
                        <span id="movieRating" class="bg-amber-500/10 text-amber-400 border border-amber-500/30 px-3 py-1 rounded-full text-xs font-semibold flex items-center gap-1">
                            <i class="fa-solid fa-star"></i> <span id="ratingValue"></span>
                        </span>
                        <span id="movieRuntime" class="bg-slate-800 px-3 py-1 rounded-full text-xs text-slate-300"></span>
                    </div>
                    <p id="moviePlot" class="text-slate-400 leading-relaxed mt-4"></p>
                </div>

                <div class="grid grid-cols-2 gap-4 border-t border-slate-800 pt-4 mt-6 text-sm">
                    <div>
                        <span class="text-slate-500 block">Director:</span>
                        <span id="movieDirector" class="text-slate-300 font-medium"></span>
                    </div>
                    <div>
                        <span class="text-slate-500 block">Actors:</span>
                        <span id="movieActors" class="text-slate-300 font-medium"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
